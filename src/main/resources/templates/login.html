<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
</head>
<body>
<h1 data-testid="login-page-title">Вход в систему</h1>
<div th:if="${param.error}" data-testid="login-error">Неверный логин или пароль</div>
<div th:if="${param.logout}" data-testid="logout-message">Вы успешно вышли из системы</div>
<div th:if="${param.registered}" data-testid="registration-success">Регистрация прошла успешно</div>
<form th:action="@{/login}" method="post" data-testid="login-form">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <div>
        <label for="username">Логин:</label>
        <input id="username" data-testid="username-input" type="text" name="username" required>
    </div>
    <div>
        <label for="password">Пароль:</label>
        <input id="password" data-testid="password-input" type="password" name="password" required>
    </div>
    <div>
        <button type="submit" data-testid="login-button">Войти</button>
    </div>
</form>
<p><a th:href="@{/registration}">Регистрация</a></p>
<p>Тестовые пользователи: admin/admin, user/user</p>
</body>
</html>
