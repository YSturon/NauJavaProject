<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
</head>
<body>
<h1>Вход в систему</h1>
<div th:if="${param.error}">Неверный логин или пароль</div>
<div th:if="${param.logout}">Вы успешно вышли из системы</div>
<div th:if="${param.registered}">Регистрация прошла успешно</div>
<form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <div><label>Логин: <input type="text" name="username" required></label></div>
    <div><label>Пароль: <input type="password" name="password" required></label></div>
    <div><button type="submit">Войти</button></div>
</form>
<p><a th:href="@{/registration}">Регистрация</a></p>
<p>Тестовые пользователи: admin/admin, user/user</p>
</body>
</html>
